# After recipes.json changes (e.g. Google Apps Script), generate recipes/<slug>/index.html
# and sitemap.xml so /recipes/.../ URLs exist on GitHub Pages (avoids 404).
#
# ROLLBACK (if deployment breaks):
#   1. List tags:  git tag -l 'deploy-*' | sort
#   2. Revert:    git checkout deploy-<PREVIOUS_TAG>
#                 git checkout -b rollback/$(date +%Y%m%d)
#                 git push origin rollback/$(date +%Y%m%d)
#   3. Create a PR from rollback/ branch to main, or force-push after review.
#
# BRANCH PROTECTION (recommended — manual setup, NOT enforced by this workflow):
#   1. GitHub repo → Settings → Branches → Add branch protection rule for `main`
#   2. Require pull request reviews before merging (at least 1 review)
#   3. Require status checks to pass before merging
#   4. Do NOT enable "Include administrators" until rule is verified
name: Build static recipe pages

on:
  push:
    branches: [main]
    paths:
      - "recipes.json"
      - "recipe.html"
      - "scripts/build-recipe-pages.mjs"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-recipes-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate recipes.json
        run: |
          node -e "
            JSON.parse(require('fs').readFileSync('recipes.json','utf8'));
            console.log('recipes.json is valid JSON');
          "

      - name: Generate recipes/ and sitemap.xml
        run: CI_BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%S+00:00) node scripts/build-recipe-pages.mjs

      - name: Count generated pages
        run: |
          COUNT=$(find recipes -name "index.html" | wc -l)
          echo "COUNT=$COUNT" >> $GITHUB_ENV
          echo "Generated $COUNT static recipe pages"
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Recipe pages generated:** $COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Sitemap updated:** Yes" >> $GITHUB_STEP_SUMMARY

      - name: Validate generated page count
        run: |
          RECIPE_COUNT=$(node -e "
            const r = require('fs').readFileSync('recipes.json','utf8');
            const d = JSON.parse(r);
            const n = (d.recipes || []).length;
            console.log(n);
          ")
          echo "JSON recipe count: $RECIPE_COUNT"
          echo "Generated page count: $COUNT"
          if [ "$RECIPE_COUNT" -ne "$COUNT" ]; then
            echo "::error::Page mismatch: $RECIPE_COUNT recipes but $COUNT pages generated"
            exit 1
          fi
          echo "All $COUNT pages validated — count matches recipes.json"

      - name: Validate sitemap entry count
        run: |
          RECIPE_COUNT=$(node -e "
            const r = require('fs').readFileSync('recipes.json','utf8');
            const d = JSON.parse(r);
            const n = (d.recipes || []).length;
            console.log(n);
          ")
          STATIC_PAGES=4
          EXPECTED=$((RECIPE_COUNT + STATIC_PAGES))
          SITEMAP_ENTRIES=$(grep -c '<url>' sitemap.xml || true)
          echo "Sitemap URL entries: $SITEMAP_ENTRIES"
          echo "Expected ($RECIPE_COUNT recipes + $STATIC_PAGES static): $EXPECTED"
          if [ "$SITEMAP_ENTRIES" -ne "$EXPECTED" ]; then
            echo "::error::Sitemap mismatch: $SITEMAP_ENTRIES entries but $EXPECTED expected"
            exit 1
          fi
          echo "Sitemap validated — $SITEMAP_ENTRIES entries ($RECIPE_COUNT recipes + $STATIC_PAGES static)"

      - name: Commit and push if changed
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recipes sitemap.xml llms.txt
          if git diff --staged --quiet; then
            echo "No changes (static pages already match recipes.json)."
            exit 0
          fi
          git commit -m "chore: regenerate static recipe pages ($COUNT pages)"
          # Integrate any commit that landed on the branch between checkout and push (rare).
          git pull --rebase origin "$BRANCH"
          # Tag deployment for rollback: deploy-YYYYMMDD-RUN (lightweight, post-rebase)
          TAG="deploy-$(date +%Y%m%d)-${{ github.run_number }}"
          git tag "$TAG"
          git push origin "HEAD:refs/heads/$BRANCH" --tags
